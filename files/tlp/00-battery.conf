# fedora-init overrides — installed to /etc/tlp.d/00-battery.conf
# TLP's built-in defaults are already good; only non-defaults live here.
# Reference: `man tlp.conf` / https://linrunner.de/tlp

# Deeper PCIe link power savings on battery (default leaves kernel setting)
PCIE_ASPM_ON_BAT=powersupersave

# Most aggressive energy-performance hint on battery (default: balance_power)
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# ThinkPad battery longevity: only charge while below 75%, stop at 80%.
# One-off full charge before travel: `sudo tlp fullcharge`
# Don't want thresholds? Comment these out and run `sudo tlp start`.
# START_CHARGE_THRESH_BAT0=75
# STOP_CHARGE_THRESH_BAT0=80

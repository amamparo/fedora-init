# Brave: the only browser on this machine, from Brave's official rpm repo.
# The repo file ships gpgcheck=1 with the signing-key URL, so dnf imports and
# verifies the key on install — no separate rpm_key step needed. Order is
# load-bearing: repo file, install, set the default, and only THEN remove the
# other browsers, so the http/https handlers never dangle.

- name: Install Brave rpm repo file
  become: true
  ansible.builtin.copy:
    src: brave-browser.repo
    dest: /etc/yum.repos.d/brave-browser.repo
    owner: root
    group: root
    mode: "0644"
  register: brave_repo

# Guarded on package_facts (see site.yml): dnf5 refreshes repo metadata even
# for a no-op transaction, and a converged re-run must do zero network work.
# The check-mode clause: under --check the repo file above is not actually
# written, and dnf5 resolves (and NOT_FOUND-fails) even in check mode — skip
# the install when check mode would have just created the repo; the copy
# task already reports that pending change.
- name: Install Brave
  become: true
  ansible.builtin.dnf5:
    name: brave-browser
    state: present
  when:
    - "'brave-browser' not in ansible_facts.packages"
    - not (ansible_check_mode and brave_repo is changed)

# PWAs (Tidal, YouTube TV, tastytrade) via Chromium's WebAppInstallForceList
# policy — the declarative way to install web apps: Brave reads
# /etc/brave/policies/managed/*.json (path verified in the brave binary
# itself) and force-installs each app with manifest icons and an app-grid
# launcher entry; no ~/Desktop icon (create_desktop_shortcut is off).
# Trade-off: while listed, apps show as admin-installed and can't be
# removed from the Brave UI — uninstall by removing the entry and
# re-running. Chromium hot-reloads platform policy files, so a running
# Brave applies this within seconds; the tasks below cover the
# not-running case so the apps exist by the end of the play.
# The brave rpm knows this path but doesn't create it (verified: fresh
# install has no /etc/brave at all), and copy won't make parent dirs.
- name: Ensure Brave's managed-policy dir exists
  become: true
  ansible.builtin.file:
    path: /etc/brave/policies/managed
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Brave PWA policy (Tidal, YouTube TV, tastytrade)
  become: true
  ansible.builtin.copy:
    src: policies.json
    dest: /etc/brave/policies/managed/fedora-init.json
    owner: root
    group: root
    mode: "0644"

# Convergence probe: every installed PWA materializes a
# brave-<appid>-Default.desktop launcher entry. App ids aren't predictable
# offline (derived from each site's manifest), so count entries against the
# policy list — the count comes from the policy file itself, one source of
# truth. Honest limitation: the count is a heuristic — PWAs the user
# installed by hand also match the glob, so this can under-trigger, never
# over-trigger; precise matching would need the manifest-derived app ids.
- name: Count installed Brave PWA launcher entries
  ansible.builtin.command:
    argv:
      - find
      - "{{ lookup('env', 'HOME') }}/.local/share/applications"
      - -maxdepth
      - "1"
      - -name
      - brave-*-Default.desktop
  register: brave_pwa_entries
  changed_when: false
  failed_when: false
  check_mode: false

- name: Check whether Brave is running
  ansible.builtin.command:
    cmd: pgrep -x brave
  register: brave_running
  changed_when: false
  failed_when: false
  check_mode: false

# When entries are missing and Brave isn't running, nudge it awake with no
# window so the policy applies now instead of at the user's next launch.
# (If Brave IS running, the policy hot-reload already handles it — the
# wait below just observes.) nohup + & because the browser process doesn't
# exit; the spawned instance is shut down again afterwards. noqa:
# backgrounding needs a shell, and the cleanup task reports the change.
- name: Launch Brave headlessly to apply the PWA policy # noqa: command-instead-of-shell no-changed-when
  ansible.builtin.shell:
    cmd: nohup brave --no-startup-window --no-first-run >/dev/null 2>&1 & echo $!
  register: brave_nudge
  when:
    - not ansible_check_mode
    - brave_pwa_entries.stdout_lines | length < (lookup('file', 'policies.json') | from_json).WebAppInstallForceList | length
    - brave_running.rc != 0

- name: Wait for the PWA launcher entries to materialize
  ansible.builtin.command:
    argv:
      - find
      - "{{ lookup('env', 'HOME') }}/.local/share/applications"
      - -maxdepth
      - "1"
      - -name
      - brave-*-Default.desktop
  register: brave_pwa_wait
  until: brave_pwa_wait.stdout_lines | length >= (lookup('file', 'policies.json') | from_json).WebAppInstallForceList | length
  retries: 30
  delay: 2
  changed_when: brave_pwa_entries.stdout_lines | length < brave_pwa_wait.stdout_lines | length
  when:
    - not ansible_check_mode
    - brave_pwa_entries.stdout_lines | length < (lookup('file', 'policies.json') | from_json).WebAppInstallForceList | length

# Put things back: only the instance this role spawned gets stopped —
# never a browser the user had open.
- name: Stop the nudge Brave instance
  ansible.builtin.command:
    cmd: kill {{ brave_nudge.stdout | trim }}
  when: brave_nudge is not skipped
  changed_when: true
  failed_when: false

# Default browser for the desktop user — no become here. The old module's
# xdg-settings under sudo would have written root's ~/.config/mimeapps.list
# instead of the user's; xdg_mime is the same trap. This is the declarative
# equivalent of `xdg-settings set default-web-browser brave-browser.desktop`
# on GNOME, which claims exactly these five MIME types (about/unknown
# included — xdg-settings' set_browser_gnome3 sets them too). (xdg_mime
# needs community.general >= 10.7.0; it queries before writing, so a
# converged re-run reports ok.)
- name: Make Brave the default browser for the desktop user
  community.general.xdg_mime:
    handler: brave-browser.desktop
    mime_types:
      - x-scheme-handler/http
      - x-scheme-handler/https
      - x-scheme-handler/about
      - x-scheme-handler/unknown
      - text/html

# Remove the other browsers (Fedora ships Firefox), after the default points
# at Brave. Guard each with package_facts: the dnf5 CLI errors out (rather
# than no-ops) when asked to remove a package that isn't installed — and the
# guard also keeps converged re-runs offline. autoremove: the module,
# unlike the CLI, does NOT sweep now-unused dependencies by default
# (clean_requirements_on_remove is wired to this flag), and the bash flow
# relied on that sweep.
- name: Remove other browsers
  become: true
  ansible.builtin.dnf5:
    name: "{{ item }}"
    state: absent
    autoremove: true
  loop:
    - firefox
    - chromium
    - epiphany
    - google-chrome-stable
  when: item in ansible_facts.packages

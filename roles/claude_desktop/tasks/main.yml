---
# Claude Desktop — the GNOME chat GUI, wanted here for LOCAL stdio MCP
# servers (a browser PWA can't spawn processes, an Electron wrapper of
# claude.ai has no MCP host — neither cuts it).
#
# Anthropic ships NO Fedora build: the official Claude Desktop for Linux
# beta (2026-06-30) is Debian/Ubuntu-only and the docs say so outright
# ("Fedora and RHEL: only Debian-based distributions are supported today").
# So the install path is aaddrick/claude-desktop-debian, which since its
# v3.0.0 repackages Anthropic's OFFICIAL Linux .deb (a thin repack, not the
# old Windows-installer-extraction hack) into an rpm served from a signed
# DNF repo. That makes this a plain vendor-repo role — the vscode/tailscale
# pattern exactly: drop the .repo file, dnf install, and new versions then
# arrive through the updates role's `dnf upgrade` (the app does NOT
# self-update on Linux — Anthropic's own docs; dnf is the intended channel).
#
# MCP is configured by the user at ~/.config/Claude/claude_desktop_config.json
# (same stdio schema as macOS/Windows). The role deliberately does NOT manage
# that file: the servers are a per-user choice, and the app rewrites the file
# on exit ("quit Claude Desktop before you hand-edit it"), so a role-owned
# copy would fight it.
#
# Trust note: this is unofficial-squared — an unofficial repackaging of an
# app Anthropic doesn't officially ship for Fedora, pulled through a single
# maintainer's self-hosted domain and signed with THEIR key, not Anthropic's.
# Accepted deliberately; migrate to the official repo if Anthropic ever ships
# a Fedora rpm (the package Provides: claude-desktop, easing that swap).

# The vendor's served .repo file verbatim EXCEPT one added line:
# skip_if_unavailable=1. The rest is byte-diffable against
# https://pkg.claude-desktop-debian.dev/rpm/claude-desktop-unofficial.repo.
# The deviation is load-bearing here: unlike Microsoft/Tailscale, this is one
# person's self-hosted domain, and the updates role runs `dnf upgrade` on `*`
# — a dead vendor host would hard-fail EVERY system-update run without the
# flag. Precedent: the ghostty COPR file ships skip_if_unavailable too.
# gpgcheck=1 + repo_gpgcheck=1 with the gpgkey URL in the file means dnf
# imports and verifies the maintainer's key on install — no rpm --import (the
# vscode lesson: rpm 6 names imported keys by full fingerprint, so the classic
# gpg-pubkey-<short-keyid> guard never matches).
- name: Install the Claude Desktop (unofficial) rpm repo file
  become: true
  ansible.builtin.copy:
    src: claude-desktop-unofficial.repo
    dest: /etc/yum.repos.d/claude-desktop-unofficial.repo
    owner: root
    group: root
    mode: "0644"
  register: claude_desktop_repo

# The brave/vscode/tailscale pattern: the package_facts guard keeps converged
# re-runs offline (dnf5 refreshes repo metadata over the network even for a
# no-op transaction), and the check-mode clause skips when --check only
# simulated the repo file (dnf5 resolves — and fails — even in check mode).
# Guard on the EXACT rpm name claude-desktop-unofficial, never the virtual
# `claude-desktop` it Provides: the convention forbids virtual-provides
# matching, and a future official Anthropic rpm named claude-desktop would
# false-match and silently skip the install.
- name: Install Claude Desktop
  become: true
  ansible.builtin.dnf5:
    name: claude-desktop-unofficial
    state: present
  when:
    - "'claude-desktop-unofficial' not in ansible_facts.packages"
    - not (ansible_check_mode and claude_desktop_repo is changed)

# GNOME binds a live window back to its .desktop entry by matching the
# window's WM_CLASS (X11) / app_id (Wayland) against StartupWMClass (then a
# basename fallback). The official Electron build advertises "claude-desktop":
# Chromium's GetXdgAppId() derives it from the app's internal desktopName
# ("claude-desktop.desktop", in the asar), IGNORING the launcher's --class=Claude
# (verified: aaddrick/claude-desktop-debian #588). The vendor rpm's entry ships
# StartupWMClass=Claude AND basename claude-desktop-unofficial, so NEITHER the
# StartupWMClass table nor the basename fallback matches the running window —
# GNOME then shows the raw app_id "claude-desktop" with a blank/generic icon.
# (App-search still works: it reads Name=/Icon= straight off the .desktop, no
# live window involved — which is why the entry looks right until you launch it.)
#
# Fix: shadow the /usr/share entry with a SAME-BASENAME copy in the user data
# dir. ~/.local/share/applications is the highest-precedence XDG dir, so a file
# with the same desktop-file ID fully REPLACES the system one (desktop entries
# don't merge across dirs, unlike GSettings), and dnf upgrades only ever rewrite
# the /usr/share copy — the override survives. The only delta from the vendor
# file is StartupWMClass=claude-desktop, the real advertised app_id. $HOME file,
# user session — NEVER become (root's copy would land in /root and bind nothing).
- name: Shadow the Claude Desktop launcher so GNOME can bind its window+icon
  ansible.builtin.copy:
    src: claude-desktop.desktop
    dest: "{{ lookup('env', 'HOME') }}/.local/share/applications/claude-desktop-unofficial.desktop"
    mode: "0644"
  register: claude_desktop_override

# Rebuild the user mimeinfo cache so the claude:// handler + the shell's
# StartupWMClass map pick up the shadowed entry. Only on change — the copy
# above is the idempotency gate; running it every converged pass would churn.
- name: Refresh the desktop database for the shadowed launcher # noqa: no-handler
  # Inline, not a handler: the refresh is specific to this one launcher dir and
  # is meaningful only as the immediate consequence of the copy above — keeping
  # it adjacent makes that single-consumer dependency explicit, and the
  # `is changed` gate already delivers the run-only-on-change a handler would.
  ansible.builtin.command: >-
    update-desktop-database {{ lookup('env', 'HOME') }}/.local/share/applications
  when: claude_desktop_override is changed
  changed_when: claude_desktop_override is changed

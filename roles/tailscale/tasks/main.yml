---
# Tailscale from its official rpm repo (files/tailscale.repo, fetched
# verbatim from pkgs.tailscale.com — gpgcheck AND repo_gpgcheck are the
# vendor's own settings). The one step no role can do is login: `tailscale
# up` is a browser auth flow, so the role installs, starts the daemon, and
# reports what's left.

- name: Install Tailscale rpm repo file
  become: true
  ansible.builtin.copy:
    src: tailscale.repo
    dest: /etc/yum.repos.d/tailscale.repo
    owner: root
    group: root
    mode: "0644"
  register: tailscale_repo

# The brave/vscode pattern: package_facts guard keeps converged re-runs
# offline, and the check-mode clause skips when --check only simulated the
# repo file (dnf5 resolves — and fails — even in check mode).
- name: Install Tailscale
  become: true
  ansible.builtin.dnf5:
    name: tailscale
    state: present
  when:
    - "'tailscale' not in ansible_facts.packages"
    - not (ansible_check_mode and tailscale_repo is changed)

# System service — the daemon owns the WireGuard tunnel, so this one really
# is root. Gated for fresh --check: systemd_service fails on units whose
# package install was only simulated (the battery-role gotcha).
- name: Enable and start tailscaled
  become: true
  ansible.builtin.systemd_service:
    name: tailscaled.service
    enabled: true
    state: started
  when: not ansible_check_mode or 'tailscale' in ansible_facts.packages

# Surface the login state, like the old modules' closing echoes. Probe the
# binary first: under fresh --check nothing above actually installed.
- name: Probe for the tailscale binary
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_bin
  check_mode: false

- name: Read the tailscale backend state
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  check_mode: false
  when: tailscale_bin.stat.exists

- name: Report that tailscale needs a one-time login
  ansible.builtin.debug:
    msg: "Tailscale is installed but not logged in — run: sudo tailscale up"
  when: >-
    tailscale_bin.stat.exists
    and '"NeedsLogin"' in (tailscale_status.stdout | default(''))

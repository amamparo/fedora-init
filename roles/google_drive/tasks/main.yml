---
# Google Drive as the cross-install stash, via rclone — the Fedora-friendly
# Drive client: distro-packaged, no daemon, scriptable. Two one-time,
# unavoidably interactive steps are surfaced as reminders, the
# tailscale-up/claude-sign-in pattern:
#   rclone:  `rclone config create drive drive` (browser OAuth; the token
#            lands in ~/.config/rclone/rclone.conf)
#   GOA:     Settings > Online Accounts > Google (puts Drive in the Files
#            sidebar; tokens live in the keyring, so no file this role
#            could write would constitute a working account)
# Day-to-day: `rclone copy ~/thing drive:stash/thing`, `rclone bisync` for
# two-way, `rclone mount drive: ~/Drive` for a filesystem view.

- name: Install rclone
  become: true
  ansible.builtin.dnf5:
    name: rclone
    state: present
  when: "'rclone' not in ansible_facts.packages"

# failed_when: false and an rc gate, not a hard dependency: under fresh
# --check the install above was only simulated and the binary doesn't
# exist (the caveman-probe pattern).
- name: List configured rclone remotes
  ansible.builtin.command:
    cmd: rclone listremotes
  register: google_drive_remotes
  changed_when: false
  failed_when: false
  check_mode: false

- name: Report the one-time rclone Drive setup
  ansible.builtin.debug:
    msg:
      - "rclone has no Drive remote yet — run once: rclone config create drive drive"
      - "(opens a browser OAuth flow; then e.g. rclone copy ~/thing drive:stash/thing)"
  when: google_drive_remotes.rc == 0 and 'drive:' not in google_drive_remotes.stdout

# GNOME Online Accounts: a configured Google account shows as
# Provider=google in accounts.conf. Probe only — the OAuth flow cannot be
# scripted and its tokens live in the keyring.
- name: Probe GNOME Online Accounts for a Google account
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - Provider=google
      - "{{ lookup('env', 'HOME') }}/.config/goa-1.0/accounts.conf"
  register: google_drive_goa
  changed_when: false
  failed_when: false
  check_mode: false

- name: Report the one-time Online Accounts setup
  ansible.builtin.debug:
    msg: "Add Google in Settings > Online Accounts to get Drive in the Files sidebar (OAuth — can't be scripted)."
  when: google_drive_goa.rc != 0

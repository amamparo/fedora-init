# GNOME prefs: the handful of desktop settings that differ from stock
# Fedora. Everything in this role talks to the user session — dconf,
# gsettings, mutter's session-bus D-Bus API — and must run as the desktop
# user. NO become anywhere here: under root the writes would land in root's
# dconf and the session bus wouldn't even be reachable.

# community.general.dconf takes GVariant *text*, not YAML types: strings
# carry their own inner quotes ("'prefer-dark'"), booleans and doubles are
# bare ("true", "0.19"), and the empty dock must be the typed "@as []" — a
# bare "[]" is untyped and invalid for dconf.
- name: Apply GNOME desktop preferences
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { key: /org/gnome/desktop/interface/color-scheme, value: "'prefer-dark'" }
    - { key: /org/gnome/desktop/interface/show-battery-percentage, value: "true" }
    - { key: /org/gnome/desktop/wm/preferences/button-layout, value: "'appmenu:minimize,maximize,close'" }
    # empty dock — "@as []" carries the string-array type annotation
    - { key: /org/gnome/shell/favorite-apps, value: "@as []" }
    - { key: /org/gnome/desktop/peripherals/touchpad/speed, value: "0.19" }
  loop_control:
    label: "{{ item.key }}"

# Wallpaper: the repo's amber-d.jxl, staged into the user backgrounds dir
# (~/.local/share/backgrounds is where Settings itself drops user-picked
# wallpapers) and pointed at by the background dconf keys. The picture-uri
# value is a GVariant string wrapping a file:// URI; HOME is absolute so the
# leading "/" makes the canonical three-slash file:/// form. Both the light
# and dark keys are set — color-scheme is prefer-dark, but setting both means
# a mode flip never falls back to Fedora's stock background. picture-options
# 'zoom' scales-to-fill, matching GNOME's default framing. User session, no
# become. (JPEG XL renders as a wallpaper only if the gdk-pixbuf JXL loader is
# present — Workstation ships it; a minimal install would need libjxl's
# pixbuf module.)
- name: Ensure the user backgrounds dir exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.local/share/backgrounds"
    state: directory
    mode: "0755"

- name: Stage the wallpaper into the user backgrounds dir
  ansible.builtin.copy:
    src: amber-d.jxl
    dest: "{{ lookup('env', 'HOME') }}/.local/share/backgrounds/amber-d.jxl"
    mode: "0644"

- name: Set the desktop wallpaper
  community.general.dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { key: /org/gnome/desktop/background/picture-uri, value: "'file://{{ lookup('env', 'HOME') }}/.local/share/backgrounds/amber-d.jxl'" }
    - { key: /org/gnome/desktop/background/picture-uri-dark, value: "'file://{{ lookup('env', 'HOME') }}/.local/share/backgrounds/amber-d.jxl'" }
    - { key: /org/gnome/desktop/background/picture-options, value: "'zoom'" }
  loop_control:
    label: "{{ item.key }}"

# Displays > Scale: 100% (Fedora defaults this panel to 125%). Monitor scale
# is not a gsettings key — it lives in monitors.xml, owned by mutter's
# DisplayConfig D-Bus API; ApplyMonitorsConfig method 2 persists there AND
# applies live (see library/mutter_display_scale.py). The module applies only
# when the built-in panel ("is-builtin" in the monitor props — a bare
# logical-monitor count would misfire docked lid-closed) is the sole active
# display: positions are in scale-dependent logical pixels, and mutter
# *rejects* a re-scaled layout whose monitors then overlap ("Logical monitors
# overlap") rather than repositioning it — a hard failure, not a fixup.
# monitors.xml keys configs by the set of connected monitors anyway, so the
# docked layout is a separate config arranged in Settings. Check mode only
# calls the read-only GetCurrentState. Session bus: no become.
- name: Set the built-in panel to 100% display scale
  mutter_display_scale:
    scale: 1.0
  register: display_scale

# The module reports the docked case as ok-with-message, which ansible never
# shows at default verbosity — surface it like the bash module's echo did
# (applied is false only for the not-sole-display skip).
- name: Report why the display scale was left alone
  ansible.builtin.debug:
    msg: "{{ display_scale.msg }}"
  when: not display_scale.applied

# fedora-init ansible configuration. install.sh runs ansible-playbook from
# the repo root, so this file is picked up from cwd.
[defaults]
inventory = hosts.ini
# Nothing in this workload needs setup facts; package facts are gathered
# explicitly as the play's guard layer (see site.yml).
gathering = explicit
interpreter_python = /usr/bin/python3
# Roles and the two custom D-Bus modules live in-repo.
roles_path = roles
library = library
display_skipped_hosts = False

# pipelining must stay OFF: the local connection only allocates a pty for
# become when pipelining is disabled, and that throwaway pty is what keeps
# pam_fprintd out of the way — sudo adopts it as its tty (no logind seat, so
# the fingerprint module bails to pam_unix and reads the piped password).
# With pipelining on, sudo falls back to the real terminal as its tty and
# fingerprint-first PAM hangs every become task into a timeout.
[connection]
pipelining = False
